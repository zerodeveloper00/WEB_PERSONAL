<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daniel Cortez | Contacto</title>
    <link rel="stylesheet" href="/WEB_PERSONAL/assets/css/style.css" />
    <link rel="stylesheet" href="/WEB_PERSONAL/assets/css/responsive.css" />
    <link rel="stylesheet" href="/WEB_PERSONAL/assets/css/animations.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
    <!-- Canvas de partículas (opcional, si quieres quitarlas elimina esta línea) -->
    <canvas id="particles-canvas"></canvas>

    <div id="navbar"></div>

    <main class="page-content">
        <div class="container">
            <h2 class="page-title reveal">Contacto</h2>
            <div class="contact-wrapper glass-card reveal">
                <div class="contact-info">
                    <p><strong>Email:</strong> josedanielcortezpalacios@gmail.com</p>
                    <p><strong>Teléfono:</strong> +51 931 050 681</p>
                    <p><strong>Ubicación:</strong> Piura, Perú</p>
                    <p>
                        <a href="/WEB_PERSONAL/assets/cv/cv-daniel-cortez.pdf" download class="btn btn-primary btn-glow" style="display:inline-block; margin-top:1rem;">
                            📄 Descargar CV (PDF)
                        </a>
                    </p>
                </div>

                <!-- FORMULARIO CON FORMPREE -->
                <form id="contact-form" class="contact-form">
                    <!-- Campos ocultos para Formspree -->
                    <input type="hidden" name="_subject" value="Nuevo mensaje desde tu Portafolio Web" />
                    <!-- _captcha activa el captcha de Formspree (opcional pero recomendado) -->
                    <input type="hidden" name="_captcha" value="true" />

                    <input type="text" name="nombre" placeholder="Tu nombre" required />
                    <input type="email" name="email" placeholder="Tu correo electrónico" required />
                    <textarea name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                    
                    <button type="submit" class="btn btn-primary btn-glow" id="submit-btn">
                        Enviar mensaje 🚀
                    </button>

                    <!-- Contenedor para mensaje de éxito/error -->
                    <div id="form-status" style="margin-top: 1.5rem; text-align: center; font-weight: 600;"></div>
                </form>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <!-- Scripts -->
    <script src="/WEB_PERSONAL/assets/js/particles.js"></script>
    <script src="/WEB_PERSONAL/assets/js/script.js"></script>

    <!-- Lógica del formulario (fetch a Formspree) -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('contact-form');
            const statusDiv = document.getElementById('form-status');
            const submitBtn = document.getElementById('submit-btn');

            // ⚠️ ¡IMPORTANTE! Reemplaza "TU_CODIGO_UNICO" con el código que te dio Formspree
            const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xpqvzvad';

            form.addEventListener('submit', function(e) {
                e.preventDefault(); // Evita que la página se recargue

                // Deshabilitar botón para evitar envíos dobles
                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviando... ⏳';
                statusDiv.innerHTML = ''; // Limpiar mensajes anteriores

                const formData = new FormData(form);

                fetch(FORMSPREE_ENDPOINT, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                })
                .then(response => {
                    if (response.ok) {
                        // ÉXITO
                        statusDiv.innerHTML = '✅ ¡Mensaje enviado con éxito! Te responderé pronto.';
                        statusDiv.style.color = '#4ade80'; // Verde neón
                        statusDiv.style.textShadow = '0 0 20px rgba(74, 222, 128, 0.3)';
                        form.reset(); // Limpiar el formulario
                    } else {
                        // ERROR en la respuesta
                        response.json().then(data => {
                            if (Object.hasOwn(data, 'error')) {
                                statusDiv.innerHTML = '❌ Error: ' + data.error.message;
                            } else {
                                statusDiv.innerHTML = '❌ Ocurrió un error inesperado. Intenta de nuevo.';
                            }
                            statusDiv.style.color = '#f87171';
                        });
                    }
                })
                .catch(error => {
                    // Error de red
                    statusDiv.innerHTML = '❌ Error de conexión. Revisa tu internet e inténtalo de nuevo.';
                    statusDiv.style.color = '#f87171';
                    console.error('Error:', error);
                })
                .finally(() => {
                    // Reactivar botón
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enviar mensaje 🚀';
                });
            });
        });
    </script>
</body>
</html>
